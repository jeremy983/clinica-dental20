<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Citas | DentalApp</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="color.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">🦷 <h1>DentalApp</h1></div>
        <ul>
            <li><a href="diente.html">🏠 Inicio</a></li>
            <li><a href="Expedientes.html" class="active">📅 Citas</a></li>
            <li><a href="paciente.html">👥 Pacientes</a></li>
            <li><a href="Imágenes.html">🩻 Radiografías</a></li>
        </ul>
    </nav>

    <main class="content">
                <div class="header-text hero-card">
                        <div class="hero-left">
                            <h2>Expediente de Citas</h2>
                            <p>Registre el historial clínico de sus pacientes.</p>
                        </div>
                        <div class="hero-actions">
                            <button class="btn-ghost" id="nueva-cita-btn">➕ Nueva cita</button>
                        </div>
                </div>
        <form id="form-cita" class="glass-form">
            <div class="input-group">
                <select id="paciente-select" required style="flex:1; padding:12px; border-radius:10px; border:1px solid var(--border-color); background: #2b3a4a; color: var(--text-main);">
                    <option value="" disabled selected>-- Seleccione un Paciente --</option>
                </select>
                <input type="date" id="fecha-cita" required>
            </div>
            <textarea id="notas-cita" placeholder="Notas del tratamiento..."></textarea>
            <button type="submit" class="btn-primary">Guardar Cita</button>
        </form>
        <div id="lista-citas" class="cards-grid"></div>
    </main>
    <script src="app.js"></script>
</body>
</html>
